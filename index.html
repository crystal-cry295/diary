<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>日记</title>
<style>
:root {
  --bg:#FAFAFA; --card:#fff; --text:#1A1A1A; --muted:#888; --faint:#CCC;
  --border:#EEE; --shadow:0 2px 8px rgba(0,0,0,.04); --radius:12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-text-size-adjust:100%;-webkit-font-smoothing:antialiased}
button{touch-action:manipulation;cursor:pointer;border:none;outline:none;font-family:inherit;min-width:44px;min-height:44px}
input,textarea{outline:none;border:1px solid var(--border);font-family:inherit;font-size:16px;border-radius:8px;transition:border-color .2s,box-shadow .2s}
input:focus,textarea:focus{border-color:var(--text);box-shadow:0 1px 0 var(--text)}

/* 密码 */
#pwd-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;padding:2rem;background:var(--bg)}
#pwd-screen .logo{font-size:2.5rem;margin-bottom:.5rem}
#pwd-screen h1{font-size:1.4rem;font-weight:300;margin-bottom:2rem;letter-spacing:.06em;color:var(--text)}
#pwd-screen .hint{font-size:.8rem;color:var(--muted);margin-bottom:1.2rem;letter-spacing:.04em}
#pwd-screen input{width:220px;padding:.9rem 1rem;font-size:1.4rem;text-align:center;letter-spacing:.4em;background:var(--card);border:1px solid var(--border);border-radius:8px}
#pwd-screen button{margin-top:1.2rem;padding:.8rem 3rem;background:var(--text);color:#fff;font-size:.85rem;border-radius:8px;letter-spacing:.06em;transition:background .2s}
#pwd-screen button:hover{background:#000}
#pwd-screen .error{color:#c0392b;font-size:.8rem;margin-top:.6rem;min-height:1.2em}
#pwd-screen .status{font-size:.7rem;color:var(--faint);margin-top:2rem;letter-spacing:.04em}

/* 主界面 */
#main{display:none;max-width:720px;margin:0 auto;padding:2rem 1.25rem 6rem}
#main.on{display:block}

/* 工具栏 */
.toolbar{display:flex;justify-content:space-between;align-items:center;padding:1.25rem 0;margin-bottom:2rem;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.toolbar h1{font-size:1rem;font-weight:400;letter-spacing:.08em;color:var(--muted)}
.toolbar .acts{display:flex;gap:.4rem}
.toolbar button{padding:.5rem .9rem;font-size:.75rem;border-radius:6px;background:transparent;color:var(--muted);border:1px solid var(--border);min-height:36px;letter-spacing:.04em;transition:all .2s}
.toolbar button:hover{background:var(--text);color:#fff;border-color:var(--text)}
.toolbar button.pri{background:var(--text);color:#fff;border-color:var(--text)}
.toolbar button.pri:hover{background:#000}

/* 日记列表 */
.list{position:relative}
/* 时间线 */
.list::before{content:'';position:absolute;left:7px;top:0;bottom:0;width:1px;background:var(--border)}

.entry{position:relative;padding-left:28px;margin-bottom:2.5rem}
.entry::before{content:'';position:absolute;left:2px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--card);border:2px solid var(--border);transition:border-color .3s}
.entry:hover::before{border-color:var(--muted)}

.entry .meta{font-family:"Georgia","Times New Roman",serif;font-size:.75rem;color:var(--faint);margin-bottom:.8rem;display:flex;justify-content:space-between;align-items:center;letter-spacing:.03em}
.entry .meta .date{font-weight:400}
.entry .meta .updated{font-size:.65rem;color:var(--faint);font-style:italic}
.entry .meta .acts2{display:flex;gap:.3rem;opacity:0;transition:opacity .2s}
.entry:hover .meta .acts2{opacity:1}
.entry .meta .acts2 button{font-size:.65rem;padding:.3rem .6rem;min-height:28px;border-radius:4px;background:transparent;color:var(--faint);border:1px solid transparent;letter-spacing:.03em;transition:all .2s}
.entry .meta .acts2 button:hover{color:var(--muted);border-color:var(--border)}

.entry .body{font-size:16px;line-height:1.85;white-space:pre-wrap;word-break:break-word;color:var(--text)}
.entry .body.editing textarea{width:100%;min-height:180px;padding:1rem;font-size:16px;line-height:1.85;border:1px solid var(--border);border-radius:8px;resize:vertical;background:var(--card)}
.entry .body .edit-acts{margin-top:.6rem;display:flex;gap:.5rem}
.entry .body .edit-acts button{padding:.5rem 1.2rem;font-size:.8rem;border-radius:6px;letter-spacing:.04em;transition:all .2s}
.entry .body .edit-acts .sv{background:var(--text);color:#fff}
.entry .body .edit-acts .sv:hover{background:#000}
.entry .body .edit-acts .cc{background:transparent;color:var(--muted);border:1px solid var(--border)}

.entry .imgs{display:flex;flex-wrap:wrap;gap:.5rem;margin-top:.8rem}
.entry .imgs img{max-width:100%;max-height:360px;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.entry .imgs img:hover{transform:scale(1.01)}

/* 时间线点 */
@media(max-width:600px){.list::before{left:5px}.entry{padding-left:24px}.entry::before{left:0;width:9px;height:9px}}

/* FAB */
#fab{display:none;position:fixed;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));right:1.5rem;width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;font-size:1.4rem;box-shadow:0 4px 20px rgba(0,0,0,.1);z-index:50;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s}
#fab.on{display:flex}
#fab:hover{transform:scale(1.05);box-shadow:0 6px 24px rgba(0,0,0,.15)}
@media(min-width:600px){#fab.on{display:none}}

/* 覆盖层 */
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.2);z-index:100;justify-content:center;align-items:flex-start;padding:3rem 1rem}
.overlay.on{display:flex}
.modal{background:var(--card);border-radius:var(--radius);padding:1.75rem;width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,.1)}
.modal h2{font-size:1rem;font-weight:400;margin-bottom:1rem;letter-spacing:.04em}
.modal textarea{width:100%;min-height:200px;padding:1rem;font-size:16px;line-height:1.8;border:1px solid var(--border);border-radius:8px;resize:vertical;background:var(--bg)}
.modal .upl{margin-top:.8rem}
.modal .upl label{display:inline-flex;align-items:center;gap:.4rem;padding:.6rem 1rem;background:transparent;color:var(--muted);border:1px solid var(--border);border-radius:8px;font-size:.8rem;cursor:pointer;min-height:44px;transition:all .2s;letter-spacing:.03em}
.modal .upl label:hover{background:var(--text);color:#fff;border-color:var(--text)}
.modal .upl input[type=file]{display:none}
.modal .prevs{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.6rem}
.modal .prevs .pw{position:relative}
.modal .prevs img{height:72px;border-radius:6px;border:1px solid var(--border)}
.modal .prevs .rm{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--text);color:#fff;font-size:11px;line-height:20px;text-align:center;cursor:pointer}
.modal .btns{display:flex;gap:.5rem;margin-top:1.2rem;justify-content:flex-end}
.modal .btns button{padding:.7rem 1.5rem;font-size:.85rem;border-radius:8px;min-height:44px;letter-spacing:.04em;transition:all .2s}
.modal .btns .s{background:var(--text);color:#fff}
.modal .btns .s:hover{background:#000}
.modal .btns .c{background:transparent;color:var(--muted);border:1px solid var(--border)}

/* 确认框 */
.confirm-box{padding:.5rem;text-align:center}
.confirm-box p{font-size:.9rem;margin-bottom:1.2rem}
.confirm-box .btns2{display:flex;gap:.5rem;justify-content:center}
.confirm-box .btns2 button{padding:.7rem 2rem;font-size:.85rem;border-radius:8px;min-height:44px;letter-spacing:.04em;transition:all .2s}
.confirm-box .btns2 .c2{background:transparent;color:var(--muted);border:1px solid var(--border)}
.confirm-box .btns2 .d2{background:#c0392b;color:#fff}

/* 进度 */
#progress{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(250,250,250,.98);z-index:200;flex-direction:column;align-items:center;justify-content:center}
#progress.on{display:flex}
#progress .bar{width:min(280px,60vw);height:3px;background:var(--border);border-radius:2px;margin-top:1rem;overflow:hidden}
#progress .bar div{height:100%;background:var(--text);transition:width .3s}
#progress .msg{font-size:.8rem;color:var(--muted);margin-top:.6rem;letter-spacing:.03em}

/* Toast */
#toast{position:fixed;bottom:max(1.5rem,env(safe-area-inset-bottom,1.5rem));left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:.7rem 1.5rem;border-radius:20px;font-size:.8rem;opacity:0;transition:opacity .3s;z-index:300;pointer-events:none;letter-spacing:.03em}
#toast.on{opacity:1}

/* 灯箱 */
.lb{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.92);z-index:400;align-items:center;justify-content:center;cursor:pointer}
.lb.on{display:flex}
.lb img{max-width:95%;max-height:95%}

/* 动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.entry{animation:fadeIn .35s ease backwards}
</style>
</head>
<body>

<!-- 密码 -->
<div id="pwd-screen">
  <div class="logo">📓</div>
  <h1>日记</h1>
  <div class="hint" id="pwd-hint">输入密码以继续</div>
  <input type="password" id="pwd-in" maxlength="4" placeholder="····" autocomplete="off" inputmode="numeric" pattern="\d*">
  <button onclick="checkPwd()">进入</button>
  <div class="error" id="pwd-err"></div>
  <div class="status" id="api-status"></div>
</div>
<input type="file" id="import-file" accept=".json" style="display:none" onchange="doImport(event)" multiple>

<!-- 主界面 -->
<div id="main">
  <div class="toolbar">
    <h1>DIARY</h1>
    <div class="acts">
      <button onclick="document.getElementById('import-file').click()">导入</button>
      <button onclick="doExport()">导出</button>
      <button class="pri" onclick="openEditor()">+ 写日记</button>
    </div>
  </div>
  <div class="list" id="list"></div>
  <div id="empty" style="text-align:center;color:var(--faint);margin-top:6rem;display:none"><p style="font-size:3rem;margin-bottom:.5rem">—</p><p style="font-size:.85rem;letter-spacing:.05em">还没有日记</p></div>
</div>

<!-- FAB -->
<div id="fab" class="on" onclick="openEditor()">+</div>

<!-- 编辑器 -->
<div class="overlay" id="editor">
  <div class="modal">
    <h2>写日记</h2>
    <textarea id="ed-text" placeholder="今天..."></textarea>
    <div class="upl"><label for="ed-imgs">📷 添加图片</label><input type="file" id="ed-imgs" accept="image/jpeg,image/png,image/webp" multiple onchange="onImgs(event)"></div>
    <div class="prevs" id="prevs"></div>
    <div class="btns"><button class="c" onclick="closeEditor()">取消</button><button class="s" onclick="saveEntry()">保存</button></div>
  </div>
</div>

<!-- 确认删除 -->
<div class="overlay" id="confirm">
  <div class="modal" style="max-width:340px"><div class="confirm-box"><p>删除这篇日记？</p><div class="btns2"><button class="c2" onclick="closeConfirm()">取消</button><button class="d2" onclick="doDelete()">删除</button></div></div></div>
</div>

<!-- 进度 -->
<div id="progress"><p style="font-size:2rem;margin-bottom:.5rem">📥</p><div class="bar"><div id="prog-fill"></div></div><div class="msg" id="prog-msg"></div></div>

<!-- 灯箱 -->
<div class="lb" id="lb" onclick="closeLb()"><img id="lb-img" src="" alt=""></div>
<div id="toast"></div>

<script type="module">
// ==================== Supabase ====================
// ⚠️ 部署前替换为你的 Supabase 项目 URL 和 anon key
const SUPABASE_URL = 'https://ecndislqesyauizxtjrj.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjbmRpc2xxZXN5YXVpenh0anJqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2NTU1NzAsImV4cCI6MjA5OTIzMTU3MH0.1p9yGTPxw1pwyCZnc6_IGWLNXBi85hiKPpmHqaILOwM';

// ==================== API ====================
let TOKEN = null;

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } };
  if (TOKEN) opts.headers['X-Token'] = TOKEN;
  if (body) opts.body = JSON.stringify(body);
  const url = `${SUPABASE_URL}/rest/v1${path}`;
  const resp = await fetch(url, opts);
  if (!resp.ok) { const err = await resp.text(); throw new Error(err); }
  const text = await resp.text();
  return text ? JSON.parse(text) : [];
}

async function apiRaw(path, opts2 = {}) {
  const headers = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };
  if (TOKEN) headers['X-Token'] = TOKEN;
  // Don't set Content-Type for raw requests
  const resp = await fetch(`${SUPABASE_URL}${path}`, { headers, ...opts2 });
  if (!resp.ok) throw new Error(await resp.text());
  return resp;
}

// Storage: upload image
async function uploadImage(file) {
  const fname = `${Date.now()}_${Math.random().toString(36).slice(2,8)}.jpg`;
  const form = new FormData();
  form.append('file', file, fname);
  const resp = await fetch(`${SUPABASE_URL}/storage/v1/object/images/${fname}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` },
    body: form
  });
  if (!resp.ok) throw new Error('上传失败');
  // Return the public URL
  return `${SUPABASE_URL}/storage/v1/object/public/images/${fname}`;
}

function getImgUrl(pathOrUrl) {
  if (!pathOrUrl) return '';
  if (pathOrUrl.startsWith('http')) return pathOrUrl;
  return pathOrUrl;
}

// ==================== 密码 ====================
const pwdInput = document.getElementById('pwd-in');
pwdInput.addEventListener('keydown', e => { if (e.key === 'Enter') checkPwd(); });

async function init() {
  try {
    const data = await api('GET', '/settings?key=eq.password&select=value');
    const status = document.getElementById('api-status');
    const hint = document.getElementById('pwd-hint');
    if (data.length > 0) {
      status.textContent = '';
      hint.textContent = '输入密码以继续';
    } else {
      status.textContent = '⚠ 未配置密码';
      hint.textContent = '首次使用，请设置4位数字密码';
    }
  } catch(e) {
    document.getElementById('api-status').textContent = '🔴 无法连接';
  }
  pwdInput.focus();
}

async function checkPwd() {
  const v = pwdInput.value.trim();
  try {
    const data = await api('GET', '/settings?key=eq.password&select=value');
    if (data.length === 0) {
      if (!/^\d{4}$/.test(v)) { document.getElementById('pwd-err').textContent = '请输入4位数字密码'; return; }
      await api('POST', '/settings', { key: 'password', value: v });
      toast('🔒 密码已设置');
    } else {
      if (v !== data[0].value) { document.getElementById('pwd-err').textContent = '密码错误'; pwdInput.value='';pwdInput.focus();return; }
    }
    TOKEN = v;
    document.getElementById('pwd-err').textContent = '';
    enter();
  } catch(e) {
    document.getElementById('pwd-err').textContent = '验证失败: ' + e.message;
  }
}

async function enter() {
  document.getElementById('pwd-screen').style.display = 'none';
  document.getElementById('main').classList.add('on');
  await rl();
}
init();

// ==================== 渲染 ====================
let entriesCache = [];

async function rl() {
  const list = document.getElementById('list'), empty = document.getElementById('empty');
  try {
    entriesCache = await api('GET', '/diaries?select=*&order=created_at.desc');
  } catch(e) { entriesCache = []; toast('加载失败'); }
  if (!entriesCache.length) { list.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = entriesCache.map((e, idx) => {
    const upd = e.updated_at && e.updated_at !== e.created_at ? `<span class="updated">编辑于 ${e.updated_at}</span>` : '';
    let images = [];
    try { images = typeof e.images === 'string' ? JSON.parse(e.images) : (e.images || []); } catch {}
    const imgsHtml = images.length ? `<div class="imgs">${images.map(i => {
      const src = getImgUrl(i.url || i.data || i.path || '');
      return src ? `<img src="${src}" alt="" onclick="event.stopPropagation();window.lb('${src}')" loading="lazy" onerror="this.style.display='none'">` : '';
    }).join('')}</div>` : '';
    return `<div class="entry" style="animation-delay:${idx*0.02}s">
      <div class="meta"><div><span class="date">${e.created_at}</span>${upd}</div><div class="acts2"><button onclick="editEntry('${e.id}')">编辑</button><button onclick="askDel('${e.id}')">删除</button></div></div>
      <div class="body" id="body-${e.id}"><div class="content-text">${esc(e.content)}</div></div>
      ${imgsHtml}
    </div>`;
  }).join('');
}

function esc(t) { const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }

// ==================== 编辑 ====================
async function editEntry(id) {
  const e = entriesCache.find(x => x.id === id); if (!e) return;
  const body = document.getElementById('body-' + id);
  body.classList.add('editing');
  body.innerHTML = `<textarea id="edit-ta-${id}">${esc(e.content)}</textarea><div class="edit-acts"><button class="sv" onclick="saveEdit('${id}')">保存修改</button><button class="cc" onclick="cancelEdit('${id}',\`${esc(e.content)}\`)">取消</button></div>`;
  document.getElementById('edit-ta-' + id).focus();
  setUnsaved(true);
}

async function saveEdit(id) {
  const ta = document.getElementById('edit-ta-' + id); if (!ta) return;
  const content = ta.value.trim(); if (!content) { toast('内容不能为空'); return; }
  const now = fmtTime(new Date());
  try {
    await api('PATCH', `/diaries?id=eq.${id}`, { content, updated_at: now });
    setUnsaved(false); toast('已保存'); await rl();
  } catch(e) { toast('保存失败'); }
}

async function cancelEdit(id, old) {
  document.getElementById('body-' + id).classList.remove('editing');
  document.getElementById('body-' + id).innerHTML = `<div class="content-text">${old}</div>`;
  setUnsaved(false);
}

// ==================== 新建 ====================
let editId = null, pendImgs = [];
function openEditor() { editId = null; pendImgs = []; document.getElementById('ed-text').value = ''; document.getElementById('prevs').innerHTML = ''; document.getElementById('ed-imgs').value = ''; document.getElementById('editor').classList.add('on'); document.getElementById('ed-text').focus(); setUnsaved(true); }
function closeEditor() { document.getElementById('editor').classList.remove('on'); pendImgs = []; setUnsaved(false); }

async function onImgs(e) {
  const files = Array.from(e.target.files);
  for (const f of files) {
    if (f.size > 4 * 1024 * 1024) { toast('⚠️ ' + f.name + ' 超4MB'); continue; }
    // 预览用 base64，上传时转 Supabase Storage
    const r = new FileReader();
    r.onload = function() { pendImgs.push({ file: f, preview: r.result, name: f.name }); rp(); };
    r.readAsDataURL(f);
  }
  e.target.value = '';
}

function rp() {
  document.getElementById('prevs').innerHTML = pendImgs.map((img, i) =>
    `<div class="pw"><img src="${img.preview}" alt=""><div class="rm" onclick="pendImgs.splice(${i},1);rp()">×</div></div>`).join('');
}

async function saveEntry() {
  const text = document.getElementById('ed-text').value.trim();
  if (!text && !pendImgs.length) return;
  const now = fmtTime(new Date());
  // 上传图片
  const images = [];
  for (const img of pendImgs) {
    if (img.file) {
      try {
        const url = await uploadImage(img.file);
        images.push({ url, name: img.name });
      } catch(e) { toast('⚠ 图片上传失败'); images.push({ data: img.preview, name: img.name }); }
    } else {
      images.push({ data: img.preview, name: img.name });
    }
  }
  const entry = { id: 'd' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6), created_at: now, updated_at: now, content: text, images };
  try {
    await api('POST', '/diaries', entry);
    closeEditor(); await rl(); toast('已保存');
  } catch(e) { toast('保存失败: ' + e.message); }
}

// ==================== 删除 ====================
let delId = null;
function askDel(id) { delId = id; document.getElementById('confirm').classList.add('on'); }
function closeConfirm() { delId = null; document.getElementById('confirm').classList.remove('on'); }
async function doDelete() {
  if (!delId) return;
  try { await api('DELETE', `/diaries?id=eq.${delId}`); toast('已删除'); await rl(); } catch(e) { toast('删除失败'); }
  closeConfirm();
}

// ==================== 导入/导出 ====================
async function doExport() {
  try {
    const entries = await api('GET', '/diaries?select=*&order=created_at.desc');
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob), a = document.createElement('a');
    a.href = url; a.download = `diary_${new Date().toISOString().slice(0,10)}.json`; a.click();
    URL.revokeObjectURL(url); toast('导出 ' + entries.length + ' 篇');
  } catch(e) { toast('导出失败'); }
}

async function doImport(e) {
  const files = Array.from(e.target.files); if (!files.length) return;
  const prog = document.getElementById('progress'), fill = document.getElementById('prog-fill'), msg = document.getElementById('prog-msg');
  prog.classList.add('on'); fill.style.width = '0%';
  let total = 0, done = 0, errs = 0;
  for (const file of files) {
    msg.textContent = '读取 ' + file.name + '...';
    let text; try { text = await new Promise((r,j) => { const rr = new FileReader(); rr.onload = () => r(rr.result); rr.onerror = j; rr.readAsText(file); }); } catch { errs++; continue; }
    let data; try { data = JSON.parse(text); if (!Array.isArray(data)) throw new Error(); } catch { errs++; continue; }
    total += data.length;
    for (let i = 0; i < data.length; i += 30) {
      const batch = data.slice(i, i + 30).map(e => ({
        id: e.id || 'd'+Date.now().toString(36)+Math.random().toString(36).slice(2,6),
        created_at: e.created_at || e.createdAt || e.time || fmtTime(new Date()),
        updated_at: e.updated_at || e.updatedAt || e.created_at || e.createdAt || fmtTime(new Date()),
        content: e.content || '',
        images: e.images || []
      }));
      try {
        await api('POST', '/diaries', batch);
        done += batch.length;
      } catch { errs += batch.length; }
      fill.style.width = Math.round(done / total * 100) + '%';
      msg.textContent = `${done}/${total}`;
    }
  }
  prog.classList.remove('on'); toast(`${done}篇导入${errs?', '+errs+'失败':''}`);
  await rl(); e.target.value = '';
}

// ==================== 工具 ====================
function fmtTime(d) { const p = n => String(n).padStart(2, '0'); return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }
window.lb = function(src) { document.getElementById('lb-img').src = src; document.getElementById('lb').classList.add('on'); };
function closeLb() { document.getElementById('lb').classList.remove('on'); }
let tt; function toast(m) { const el = document.getElementById('toast'); el.textContent = m; el.classList.add('on'); clearTimeout(tt); tt = setTimeout(() => el.classList.remove('on'), 2200); }
let hasUnsaved = false;
function setUnsaved(v) { hasUnsaved = v; }
window.addEventListener('beforeunload', e => { if (hasUnsaved) { e.preventDefault(); e.returnValue = ''; } });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeEditor(); closeConfirm(); closeLb(); }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') { e.preventDefault(); if (document.getElementById('main').classList.contains('on')) openEditor(); }
});
</script>
